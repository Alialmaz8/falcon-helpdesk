<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign In | Falcon HelpDesk</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/login.css') }}"
    >
</head>

<body>

<main class="login-page">

    <section class="login-card">

        <div class="login-logo">FH</div>

        <h1>Falcon HelpDesk</h1>
        <p>Sign in to manage support tickets.</p>

        {% if error %}
            <div class="login-error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <label for="username">Username</label>

            <input
                type="text"
                id="username"
                name="username"
                autocomplete="username"
                required
            >

            <label for="password">Password</label>

            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                required
            >

            <button type="submit">
                Sign In
            </button>

        </form>

        <div class="demo-login">
            <strong>Demo account</strong>
            <span>Username: ali</span>
            <span>Password: Falcon123!</span>
        </div>

    </section>

</main>

</body>
</html>
